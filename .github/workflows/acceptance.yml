name: acceptance

on:
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6

      - name: create body acceptance comment with deprecated reaction input
        id: create-body-comment
        uses: ./
        with:
          body: Body-only acceptance check for run ${{ github.run_id }}.
          reaction-type: hooray

      - name: verify body comment and deprecated reaction input
        env:
          COMMENT_ID: ${{ steps.create-body-comment.outputs.comment-id }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          actual_body="$(gh api "repos/${GH_REPO}/issues/comments/${COMMENT_ID}" --jq .body)"
          expected_body="Body-only acceptance check for run ${{ github.run_id }}."

          if [ "${actual_body}" != "${expected_body}" ]; then
            echo "::error::Body-only acceptance comment did not match the expected body"
            printf 'Expected:\n%s\n\nActual:\n%s\n' "${expected_body}" "${actual_body}"
            exit 1
          fi

          reactions="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GH_REPO}/issues/comments/${COMMENT_ID}/reactions" \
            --jq '[.[].content] | sort | join(",")')"

          if [ "${reactions}" != "hooray" ]; then
            echo "::error::Deprecated reaction-type input did not add the expected reaction"
            printf 'Expected: hooray\nActual: %s\n' "${reactions}"
            exit 1
          fi

      - name: create rendered acceptance comment
        id: create-comment
        uses: ./
        with:
          file: demo/acceptance.md
          vars: |
            sha: ${{ github.sha }}
            environment: production
            app: cool-app
          reactions: eyes, rocket

      - name: verify rendered comment and reactions
        env:
          COMMENT_ID: ${{ steps.create-comment.outputs.comment-id }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          actual_body="$(gh api "repos/${GH_REPO}/issues/comments/${COMMENT_ID}" --jq .body)"
          expected_body="$(cat <<'EOF'
          # Acceptance Test

          This comment is from the acceptance test. If you are seeing this, it means the acceptance test has passed! 🎉

          **cool-app** has been successfully deployed to **production**

          - SHA: `${{ github.sha }}`
          EOF
          )"

          if [ "${actual_body}" != "${expected_body}" ]; then
            echo "::error::Rendered acceptance comment did not match the expected body"
            printf 'Expected:\n%s\n\nActual:\n%s\n' "${expected_body}" "${actual_body}"
            exit 1
          fi

          reactions="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GH_REPO}/issues/comments/${COMMENT_ID}/reactions" \
            --jq '[.[].content] | sort | join(",")')"

          if [ "${reactions}" != "eyes,rocket" ]; then
            echo "::error::Acceptance comment reactions did not match"
            printf 'Expected: eyes,rocket\nActual: %s\n' "${reactions}"
            exit 1
          fi

      - name: append to acceptance comment
        id: append-comment
        uses: ./
        with:
          comment-id: ${{ steps.create-comment.outputs.comment-id }}
          body: Acceptance append check for run ${{ github.run_id }}.

      - name: verify append mode
        env:
          COMMENT_ID: ${{ steps.create-comment.outputs.comment-id }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          actual_body="$(gh api "repos/${GH_REPO}/issues/comments/${COMMENT_ID}" --jq .body)"
          expected_body="$(cat <<'EOF'
          # Acceptance Test

          This comment is from the acceptance test. If you are seeing this, it means the acceptance test has passed! 🎉

          **cool-app** has been successfully deployed to **production**

          - SHA: `${{ github.sha }}`

          Acceptance append check for run ${{ github.run_id }}.
          EOF
          )"

          if [ "${actual_body}" != "${expected_body}" ]; then
            echo "::error::Append mode did not match the expected body"
            printf 'Expected:\n%s\n\nActual:\n%s\n' "${expected_body}" "${actual_body}"
            exit 1
          fi

      - name: replace acceptance comment
        id: replace-comment
        uses: ./
        with:
          comment-id: ${{ steps.create-comment.outputs.comment-id }}
          edit-mode: replace
          file: demo/acceptance.md
          vars: |
            sha: ${{ github.sha }}
            environment: production
            app: cool-app

      - name: verify replace mode
        env:
          COMMENT_ID: ${{ steps.create-comment.outputs.comment-id }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          actual_body="$(gh api "repos/${GH_REPO}/issues/comments/${COMMENT_ID}" --jq .body)"
          expected_body="$(cat <<'EOF'
          # Acceptance Test

          This comment is from the acceptance test. If you are seeing this, it means the acceptance test has passed! 🎉

          **cool-app** has been successfully deployed to **production**

          - SHA: `${{ github.sha }}`
          EOF
          )"

          if [ "${actual_body}" != "${expected_body}" ]; then
            echo "::error::Replace mode did not match the expected body"
            printf 'Expected:\n%s\n\nActual:\n%s\n' "${expected_body}" "${actual_body}"
            exit 1
          fi

      - name: add reaction-only update to acceptance comment
        id: reaction-only-comment
        uses: ./
        with:
          comment-id: ${{ steps.create-comment.outputs.comment-id }}
          reactions: heart, heart, invalid-reaction

      - name: verify reaction-only update
        env:
          COMMENT_ID: ${{ steps.create-comment.outputs.comment-id }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          actual_body="$(gh api "repos/${GH_REPO}/issues/comments/${COMMENT_ID}" --jq .body)"
          expected_body="$(cat <<'EOF'
          # Acceptance Test

          This comment is from the acceptance test. If you are seeing this, it means the acceptance test has passed! 🎉

          **cool-app** has been successfully deployed to **production**

          - SHA: `${{ github.sha }}`
          EOF
          )"

          if [ "${actual_body}" != "${expected_body}" ]; then
            echo "::error::Reaction-only update changed the comment body"
            printf 'Expected:\n%s\n\nActual:\n%s\n' "${expected_body}" "${actual_body}"
            exit 1
          fi

          reactions="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GH_REPO}/issues/comments/${COMMENT_ID}/reactions" \
            --jq '[.[].content] | sort | join(",")')"

          if [ "${reactions}" != "eyes,heart,rocket" ]; then
            echo "::error::Reaction-only update did not match"
            printf 'Expected: eyes,heart,rocket\nActual: %s\n' "${reactions}"
            exit 1
          fi

      - name: reject invalid-only reactions
        id: invalid-reactions
        continue-on-error: true
        uses: ./
        with:
          comment-id: ${{ steps.create-comment.outputs.comment-id }}
          reactions: invalid-reaction

      - name: verify invalid-only reaction rejection
        run: |
          if [ "${{ steps.invalid-reactions.outcome }}" != "failure" ]; then
            echo "::error::Invalid-only reactions should fail the action"
            exit 1
          fi
